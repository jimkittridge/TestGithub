<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" width="400" height="250">
  <defs>
    <linearGradient id="dur-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4A7DC4"/>
      <stop offset="100%" stop-color="#7DB4E0"/>
    </linearGradient>
  </defs>
  <!-- Sky -->
  <rect width="400" height="250" fill="url(#dur-sky)"/>
  <!-- Durham skyline silhouette (research triangle feel) -->
  <!-- Tall buildings in background -->
  <rect x="120" y="50" width="30" height="120" fill="#2D3748" opacity="0.3" rx="2"/>
  <rect x="155" y="65" width="25" height="105" fill="#2D3748" opacity="0.25" rx="2"/>
  <rect x="190" y="40" width="35" height="130" fill="#2D3748" opacity="0.3" rx="2"/>
  <rect x="230" y="55" width="28" height="115" fill="#2D3748" opacity="0.25" rx="2"/>
  <rect x="265" y="70" width="22" height="100" fill="#2D3748" opacity="0.2" rx="2"/>
  <!-- Trees/treeline -->
  <path d="M0,155 Q40,140 80,148 Q120,138 160,145 Q200,135 240,142 Q280,132 320,140 Q360,130 400,138 L400,170 L0,170Z" fill="#4CAF50" opacity="0.4"/>
  <!-- Ground -->
  <rect x="0" y="168" width="400" height="82" fill="#78909C"/>
  <!-- Modern flex space building -->
  <rect x="30" y="110" width="340" height="60" fill="#B0BEC5" rx="3"/>
  <!-- Modern metal cladding look -->
  <rect x="30" y="110" width="340" height="8" fill="#455A64"/>
  <rect x="30" y="163" width="340" height="5" fill="#546E7A"/>
  <!-- Contemporary roll-up doors -->
  <rect x="45" y="125" width="55" height="43" fill="#607D8B" rx="2"/>
  <rect x="115" y="125" width="55" height="43" fill="#607D8B" rx="2"/>
  <rect x="230" y="125" width="55" height="43" fill="#607D8B" rx="2"/>
  <rect x="300" y="125" width="55" height="43" fill="#607D8B" rx="2"/>
  <!-- Glass storefront center -->
  <rect x="182" y="122" width="36" height="46" fill="#80DEEA" opacity="0.8" rx="2"/>
  <rect x="198" y="122" width="2" height="46" fill="#455A64"/>
  <!-- Door lines -->
  <g opacity="0.2">
    <line x1="45" y1="135" x2="100" y2="135" stroke="#37474F"/>
    <line x1="45" y1="145" x2="100" y2="145" stroke="#37474F"/>
    <line x1="45" y1="155" x2="100" y2="155" stroke="#37474F"/>
    <line x1="115" y1="135" x2="170" y2="135" stroke="#37474F"/>
    <line x1="115" y1="145" x2="170" y2="145" stroke="#37474F"/>
    <line x1="115" y1="155" x2="170" y2="155" stroke="#37474F"/>
    <line x1="230" y1="135" x2="285" y2="135" stroke="#37474F"/>
    <line x1="230" y1="145" x2="285" y2="145" stroke="#37474F"/>
    <line x1="230" y1="155" x2="285" y2="155" stroke="#37474F"/>
    <line x1="300" y1="135" x2="355" y2="135" stroke="#37474F"/>
    <line x1="300" y1="145" x2="355" y2="145" stroke="#37474F"/>
    <line x1="300" y1="155" x2="355" y2="155" stroke="#37474F"/>
  </g>
  <!-- Parking -->
  <rect x="60" y="185" width="2" height="25" fill="#A0A8B0"/>
  <rect x="110" y="185" width="2" height="25" fill="#A0A8B0"/>
  <rect x="160" y="185" width="2" height="25" fill="#A0A8B0"/>
  <rect x="240" y="185" width="2" height="25" fill="#A0A8B0"/>
  <rect x="290" y="185" width="2" height="25" fill="#A0A8B0"/>
  <rect x="340" y="185" width="2" height="25" fill="#A0A8B0"/>
  <!-- Vehicles -->
  <rect x="120" y="188" width="28" height="14" fill="#1565C0" rx="3"/>
  <circle cx="127" cy="204" r="3" fill="#263238"/>
  <circle cx="143" cy="204" r="3" fill="#263238"/>
  <rect x="250" y="186" width="30" height="16" fill="#E0E0E0" rx="3"/>
  <circle cx="257" cy="204" r="3" fill="#263238"/>
  <circle cx="275" cy="204" r="3" fill="#263238"/>
  <!-- Label -->
  <rect x="140" y="215" width="120" height="22" fill="#1B2A4A" rx="4" opacity="0.9"/>
  <text x="200" y="231" font-family="Arial" font-size="12" fill="white" text-anchor="middle" font-weight="bold">DURHAM, NC</text>
</svg>