<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" width="400" height="250">
  <defs>
    <linearGradient id="col-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6BA3D6"/>
      <stop offset="40%" stop-color="#89BDE8"/>
      <stop offset="100%" stop-color="#B8D8F0"/>
    </linearGradient>
  </defs>
  <!-- Sky -->
  <rect width="400" height="250" fill="url(#col-sky)"/>
  <!-- Clouds -->
  <ellipse cx="100" cy="45" rx="55" ry="18" fill="white" opacity="0.6"/>
  <ellipse cx="140" cy="40" rx="40" ry="15" fill="white" opacity="0.5"/>
  <ellipse cx="320" cy="55" rx="50" ry="16" fill="white" opacity="0.5"/>
  <!-- Interstate overpass in background (I-26/I-77/I-20 crossroads) -->
  <rect x="0" y="120" width="400" height="8" fill="#90A4AE" rx="2"/>
  <rect x="60" y="120" width="8" height="40" fill="#78909C"/>
  <rect x="180" y="120" width="8" height="40" fill="#78909C"/>
  <rect x="300" y="120" width="8" height="40" fill="#78909C"/>
  <!-- Palmetto trees (SC state tree) -->
  <rect x="15" y="130" width="5" height="40" fill="#8D6E63"/>
  <path d="M17,130 L-5,115 L17,125Z" fill="#66BB6A" opacity="0.8"/>
  <path d="M17,130 L40,112 L17,123Z" fill="#4CAF50" opacity="0.8"/>
  <path d="M17,128 L-2,120 L17,125Z" fill="#81C784" opacity="0.7"/>
  <path d="M17,128 L38,118 L17,123Z" fill="#43A047" opacity="0.7"/>
  <path d="M17,130 L17,110" stroke="#66BB6A" stroke-width="2" fill="none"/>
  <rect x="378" y="132" width="5" height="38" fill="#8D6E63"/>
  <path d="M380,132 L358,117 L380,127Z" fill="#66BB6A" opacity="0.8"/>
  <path d="M380,132 L402,115 L380,125Z" fill="#4CAF50" opacity="0.8"/>
  <path d="M380,130 L360,122 L380,127Z" fill="#81C784" opacity="0.7"/>
  <path d="M380,130 L400,120 L380,125Z" fill="#43A047" opacity="0.7"/>
  <!-- Ground -->
  <rect x="0" y="175" width="400" height="75" fill="#78909C"/>
  <!-- Flex space building -->
  <rect x="40" y="120" width="320" height="58" fill="#D4C4A0" rx="3"/>
  <!-- Metal trim -->
  <rect x="35" y="114" width="330" height="8" fill="#455A64" rx="2"/>
  <!-- Brick texture -->
  <g opacity="0.1">
    <line x1="40" y1="135" x2="360" y2="135" stroke="#7A6040"/>
    <line x1="40" y1="150" x2="360" y2="150" stroke="#7A6040"/>
    <line x1="40" y1="165" x2="360" y2="165" stroke="#7A6040"/>
  </g>
  <!-- Roll-up doors -->
  <rect x="55" y="135" width="50" height="43" fill="#6B7C8C" rx="2"/>
  <rect x="120" y="135" width="50" height="43" fill="#6B7C8C" rx="2"/>
  <rect x="230" y="135" width="50" height="43" fill="#6B7C8C" rx="2"/>
  <rect x="295" y="135" width="50" height="43" fill="#6B7C8C" rx="2"/>
  <!-- Glass entry -->
  <rect x="183" y="138" width="34" height="40" fill="#90C8E0" opacity="0.85" rx="1"/>
  <!-- Door lines -->
  <g opacity="0.2">
    <line x1="55" y1="145" x2="105" y2="145" stroke="#4A5568"/>
    <line x1="55" y1="155" x2="105" y2="155" stroke="#4A5568"/>
    <line x1="55" y1="165" x2="105" y2="165" stroke="#4A5568"/>
    <line x1="120" y1="145" x2="170" y2="145" stroke="#4A5568"/>
    <line x1="120" y1="155" x2="170" y2="155" stroke="#4A5568"/>
    <line x1="120" y1="165" x2="170" y2="165" stroke="#4A5568"/>
    <line x1="230" y1="145" x2="280" y2="145" stroke="#4A5568"/>
    <line x1="230" y1="155" x2="280" y2="155" stroke="#4A5568"/>
    <line x1="230" y1="165" x2="280" y2="165" stroke="#4A5568"/>
    <line x1="295" y1="145" x2="345" y2="145" stroke="#4A5568"/>
    <line x1="295" y1="155" x2="345" y2="155" stroke="#4A5568"/>
    <line x1="295" y1="165" x2="345" y2="165" stroke="#4A5568"/>
  </g>
  <!-- Parking -->
  <rect x="70" y="190" width="2" height="25" fill="#A0A8B0"/>
  <rect x="130" y="190" width="2" height="25" fill="#A0A8B0"/>
  <rect x="250" y="190" width="2" height="25" fill="#A0A8B0"/>
  <rect x="310" y="190" width="2" height="25" fill="#A0A8B0"/>
  <!-- Label -->
  <rect x="130" y="215" width="140" height="22" fill="#1B2A4A" rx="4" opacity="0.9"/>
  <text x="200" y="231" font-family="Arial" font-size="12" fill="white" text-anchor="middle" font-weight="bold">COLUMBIA, SC</text>
  <!-- Warm southern sun feel -->
  <rect x="0" y="0" width="400" height="250" fill="#F5D060" opacity="0.03"/>
</svg>