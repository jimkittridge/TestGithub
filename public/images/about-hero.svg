    <rect x="230" y="290" width="2" height="20"/>
    <rect x="420" y="290" width="2" height="20"/>
    <rect x="470" y="290" width="2" height="20"/>
    <rect x="520" y="290" width="2" height="20"/>
    <rect x="570" y="290" width="2" height="20"/>
    <rect x="740" y="290" width="2" height="20"/>
    <rect x="790" y="290" width="2" height="20"/>
