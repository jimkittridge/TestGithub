      <stop offset="0%" stop-color="#5B93D0"/>
      <stop offset="100%" stop-color="#A0CBE8"/>
    </linearGradient>
    <linearGradient id="ah-warm" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F0A040" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
