  <circle cx="670" cy="228" r="16" fill="#43A047" opacity="0.7"/>
  <circle cx="665" cy="222" r="12" fill="#66BB6A" opacity="0.8"/>
  <rect x="668" y="236" width="4" height="14" fill="#5D4037"/>
