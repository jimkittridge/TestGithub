  <circle cx="73" cy="226" r="3" fill="#2D3748"/>
  <rect x="200" y="208" width="30" height="16" fill="#FFFFFF" rx="3"/>
  <circle cx="207" cy="226" r="3" fill="#2D3748"/>
  <circle cx="225" cy="226" r="3" fill="#2D3748"/>
