<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 267" width="400" height="267">
  <defs>
    <linearGradient id="sky3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5B9BD5"/>
      <stop offset="60%" stop-color="#89BDE8"/>
      <stop offset="100%" stop-color="#B8D4F0"/>
    </linearGradient>
  </defs>
  <!-- Sky -->
  <rect width="400" height="267" fill="url(#sky3)"/>
  <!-- Clouds -->
  <ellipse cx="80" cy="40" rx="50" ry="18" fill="white" opacity="0.6"/>
  <ellipse cx="300" cy="50" rx="60" ry="20" fill="white" opacity="0.5"/>
  <!-- Ground -->
  <rect x="0" y="180" width="400" height="87" fill="#868E96"/>
  <!-- Wide building - panoramic view with 5 bays -->
  <rect x="15" y="70" width="370" height="115" fill="#C8B898" rx="3"/>
  <!-- Metal fascia -->
  <rect x="10" y="62" width="380" height="12" fill="#3D5060" rx="2"/>
  <!-- Brick lines -->
  <g opacity="0.1">
    <line x1="15" y1="90" x2="385" y2="90" stroke="#7A6040"/>
    <line x1="15" y1="110" x2="385" y2="110" stroke="#7A6040"/>
    <line x1="15" y1="130" x2="385" y2="130" stroke="#7A6040"/>
    <line x1="15" y1="150" x2="385" y2="150" stroke="#7A6040"/>
  </g>
  <!-- 5 roll-up doors -->
  <rect x="25" y="105" width="55" height="75" fill="#7B8C9C" rx="2"/>
  <rect x="95" y="105" width="55" height="75" fill="#7B8C9C" rx="2"/>
  <rect x="165" y="105" width="55" height="75" fill="#7B8C9C" rx="2"/>
  <rect x="250" y="105" width="55" height="75" fill="#7B8C9C" rx="2"/>
  <rect x="320" y="105" width="55" height="75" fill="#7B8C9C" rx="2"/>
  <!-- Door panel lines -->
  <g opacity="0.2">
    <line x1="25" y1="120" x2="80" y2="120" stroke="#4A5568"/>
    <line x1="25" y1="135" x2="80" y2="135" stroke="#4A5568"/>
    <line x1="25" y1="150" x2="80" y2="150" stroke="#4A5568"/>
    <line x1="25" y1="165" x2="80" y2="165" stroke="#4A5568"/>
    <line x1="95" y1="120" x2="150" y2="120" stroke="#4A5568"/>
    <line x1="95" y1="135" x2="150" y2="135" stroke="#4A5568"/>
    <line x1="95" y1="150" x2="150" y2="150" stroke="#4A5568"/>
    <line x1="95" y1="165" x2="150" y2="165" stroke="#4A5568"/>
    <line x1="165" y1="120" x2="220" y2="120" stroke="#4A5568"/>
    <line x1="165" y1="135" x2="220" y2="135" stroke="#4A5568"/>
    <line x1="165" y1="150" x2="220" y2="150" stroke="#4A5568"/>
    <line x1="165" y1="165" x2="220" y2="165" stroke="#4A5568"/>
    <line x1="250" y1="120" x2="305" y2="120" stroke="#4A5568"/>
    <line x1="250" y1="135" x2="305" y2="135" stroke="#4A5568"/>
    <line x1="250" y1="150" x2="305" y2="150" stroke="#4A5568"/>
    <line x1="250" y1="165" x2="305" y2="165" stroke="#4A5568"/>
    <line x1="320" y1="120" x2="375" y2="120" stroke="#4A5568"/>
    <line x1="320" y1="135" x2="375" y2="135" stroke="#4A5568"/>
    <line x1="320" y1="150" x2="375" y2="150" stroke="#4A5568"/>
    <line x1="320" y1="165" x2="375" y2="165" stroke="#4A5568"/>
