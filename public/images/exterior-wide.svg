  <rect x="83" y="130" width="10" height="50" fill="#A8D8EA" opacity="0.8" rx="1"/>
  <rect x="223" y="130" width="10" height="50" fill="#A8D8EA" opacity="0.8" rx="1"/>
  <!-- Suite numbers -->
  <rect x="38" y="85" width="30" height="14" fill="#1B2A4A" rx="2"/>
  <text x="53" y="96" font-family="Arial" font-size="8" fill="white" text-anchor="middle" font-weight="bold">101</text>
  <rect x="108" y="85" width="30" height="14" fill="#1B2A4A" rx="2"/>
  <text x="123" y="96" font-family="Arial" font-size="8" fill="white" text-anchor="middle" font-weight="bold">102</text>
  <rect x="178" y="85" width="30" height="14" fill="#1B2A4A" rx="2"/>
  <text x="193" y="96" font-family="Arial" font-size="8" fill="white" text-anchor="middle" font-weight="bold">103</text>
  <rect x="263" y="85" width="30" height="14" fill="#1B2A4A" rx="2"/>
  <text x="278" y="96" font-family="Arial" font-size="8" fill="white" text-anchor="middle" font-weight="bold">104</text>
  <rect x="333" y="85" width="30" height="14" fill="#1B2A4A" rx="2"/>
  <text x="348" y="96" font-family="Arial" font-size="8" fill="white" text-anchor="middle" font-weight="bold">105</text>
