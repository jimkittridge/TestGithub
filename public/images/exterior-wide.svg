  <rect x="50" y="200" width="2" height="35" fill="#C0C8D0"/>
  <rect x="100" y="200" width="2" height="35" fill="#C0C8D0"/>
  <rect x="150" y="200" width="2" height="35" fill="#C0C8D0"/>
  <rect x="200" y="200" width="2" height="35" fill="#C0C8D0"/>
  <rect x="250" y="200" width="2" height="35" fill="#C0C8D0"/>
  <rect x="300" y="200" width="2" height="35" fill="#C0C8D0"/>
  <rect x="350" y="200" width="2" height="35" fill="#C0C8D0"/>
  <!-- Pickup truck -->
  <rect x="115" y="205" width="30" height="16" fill="#3B82F6" rx="3"/>
  <rect x="135" y="200" width="20" height="12" fill="#60A5FA" rx="2"/>
  <circle cx="122" cy="223" r="4" fill="#2D3748"/>
  <circle cx="142" cy="223" r="4" fill="#2D3748"/>
