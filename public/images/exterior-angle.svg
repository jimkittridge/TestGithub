<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 267" width="400" height="267">
  <defs>
    <linearGradient id="sky2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6BA3D6"/>
      <stop offset="100%" stop-color="#A8CCE8"/>
    </linearGradient>
    <linearGradient id="brick" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C4A882"/>
      <stop offset="100%" stop-color="#B49872"/>
    </linearGradient>
  </defs>
  <!-- Sky -->
  <rect width="400" height="267" fill="url(#sky2)"/>
  <!-- Ground -->
  <rect x="0" y="190" width="400" height="77" fill="#8B9198"/>
  <!-- Perspective building - angled view -->
  <polygon points="50,80 320,65 320,190 50,190" fill="url(#brick)"/>
  <!-- Side wall (perspective) -->
  <polygon points="320,65 390,85 390,190 320,190" fill="#A48862"/>
  <!-- Brick lines -->
  <g opacity="0.12">
    <line x1="50" y1="100" x2="320" y2="87" stroke="#7A6040"/>
    <line x1="50" y1="120" x2="320" y2="107" stroke="#7A6040"/>
    <line x1="50" y1="140" x2="320" y2="127" stroke="#7A6040"/>
    <line x1="50" y1="160" x2="320" y2="147" stroke="#7A6040"/>
  </g>
  <!-- Roof -->
  <polygon points="40,75 330,58 400,80 50,80 320,65" fill="#3A4F60"/>
  <!-- Roll-up doors -->
  <rect x="70" y="115" width="65" height="75" fill="#7A8A9A" rx="2"/>
  <rect x="155" y="112" width="65" height="78" fill="#7A8A9A" rx="2"/>
  <rect x="240" y="108" width="65" height="82" fill="#7A8A9A" rx="2"/>
  <!-- Door lines -->
  <g opacity="0.25">
    <line x1="70" y1="130" x2="135" y2="130" stroke="#4A5568"/>
    <line x1="70" y1="145" x2="135" y2="145" stroke="#4A5568"/>
    <line x1="70" y1="160" x2="135" y2="160" stroke="#4A5568"/>
    <line x1="70" y1="175" x2="135" y2="175" stroke="#4A5568"/>
    <line x1="155" y1="127" x2="220" y2="127" stroke="#4A5568"/>
    <line x1="155" y1="142" x2="220" y2="142" stroke="#4A5568"/>
    <line x1="155" y1="157" x2="220" y2="157" stroke="#4A5568"/>
    <line x1="155" y1="172" x2="220" y2="172" stroke="#4A5568"/>
    <line x1="240" y1="124" x2="305" y2="124" stroke="#4A5568"/>
    <line x1="240" y1="139" x2="305" y2="139" stroke="#4A5568"/>
    <line x1="240" y1="154" x2="305" y2="154" stroke="#4A5568"/>
    <line x1="240" y1="169" x2="305" y2="169" stroke="#4A5568"/>
  </g>
  <!-- Parking markings -->
  <rect x="80" y="210" width="3" height="40" fill="#CBD5E0" rx="1"/>
  <rect x="140" y="210" width="3" height="40" fill="#CBD5E0" rx="1"/>
  <rect x="200" y="210" width="3" height="40" fill="#CBD5E0" rx="1"/>
  <rect x="260" y="210" width="3" height="40" fill="#CBD5E0" rx="1"/>
  <!-- Curb -->
  <rect x="0" y="188" width="400" height="5" fill="#A8A8A8"/>
  <!-- Small trees -->
  <circle cx="30" cy="180" r="12" fill="#4CAF50" opacity="0.8"/>
  <rect x="28" y="182" width="4" height="15" fill="#6D4C41"/>
</svg>