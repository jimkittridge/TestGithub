<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 267" width="400" height="267">
  <defs>
    <linearGradient id="sky4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F0C27F"/>
      <stop offset="50%" stop-color="#E8B86D"/>
      <stop offset="100%" stop-color="#C9DEF4"/>
    </linearGradient>
  </defs>
  <!-- Golden hour sky -->
  <rect width="400" height="267" fill="url(#sky4)"/>
  <!-- Ground -->
  <rect x="0" y="190" width="400" height="77" fill="#7A828A"/>
  <!-- Main building front view -->
  <rect x="30" y="75" width="340" height="118" fill="#D0BC9C" rx="3"/>
  <!-- Metal top trim -->
  <rect x="25" y="68" width="350" height="10" fill="#455A64" rx="2"/>
  <!-- Brick texture -->
  <g opacity="0.1">
    <line x1="30" y1="95" x2="370" y2="95" stroke="#7A6040"/>
    <line x1="30" y1="115" x2="370" y2="115" stroke="#7A6040"/>
    <line x1="30" y1="135" x2="370" y2="135" stroke="#7A6040"/>
    <line x1="30" y1="155" x2="370" y2="155" stroke="#7A6040"/>
    <line x1="30" y1="175" x2="370" y2="175" stroke="#7A6040"/>
  </g>
  <!-- Two roll-up doors -->
  <rect x="50" y="110" width="90" height="83" fill="#6E7F8E" rx="2"/>
  <rect x="260" y="110" width="90" height="83" fill="#6E7F8E" rx="2"/>
  <!-- Door panel lines -->
  <g opacity="0.25">
    <line x1="50" y1="125" x2="140" y2="125" stroke="#4A5568"/>
    <line x1="50" y1="140" x2="140" y2="140" stroke="#4A5568"/>
    <line x1="50" y1="155" x2="140" y2="155" stroke="#4A5568"/>
    <line x1="50" y1="170" x2="140" y2="170" stroke="#4A5568"/>
    <line x1="260" y1="125" x2="350" y2="125" stroke="#4A5568"/>
    <line x1="260" y1="140" x2="350" y2="140" stroke="#4A5568"/>
    <line x1="260" y1="155" x2="350" y2="155" stroke="#4A5568"/>
    <line x1="260" y1="170" x2="350" y2="170" stroke="#4A5568"/>
  </g>
  <!-- Center glass entry with awning -->
  <rect x="175" y="100" width="50" height="93" fill="#8CBAD4" opacity="0.85" rx="2"/>
  <rect x="198" y="100" width="3" height="93" fill="#5A7A8A"/>
  <circle cx="218" cy="150" r="3" fill="#D4A848"/>
  <!-- Awning -->
  <polygon points="165,98 235,98 240,108 160,108" fill="#E86C2A" opacity="0.9"/>
  <!-- Signage -->
  <rect x="155" y="78" width="90" height="16" fill="#1B2A4A" rx="3"/>
  <text x="200" y="91" font-family="Arial" font-size="10" fill="#E86C2A" text-anchor="middle" font-weight="bold">GETFLEXSPACE</text>
  <!-- Suite signs -->
  <rect x="78" y="88" width="30" height="14" fill="#1B2A4A" rx="2"/>
  <text x="93" y="99" font-family="Arial" font-size="8" fill="white" text-anchor="middle" font-weight="bold">A-1</text>
  <rect x="290" y="88" width="30" height="14" fill="#1B2A4A" rx="2"/>
  <text x="305" y="99" font-family="Arial" font-size="8" fill="white" text-anchor="middle" font-weight="bold">A-2</text>
  <!-- Light fixtures -->
  <rect x="155" y="105" width="6" height="3" fill="#FDD835" rx="1"/>
  <rect x="240" y="105" width="6" height="3" fill="#FDD835" rx="1"/>
  <!-- Concrete sidewalk -->
  <rect x="30" y="190" width="340" height="12" fill="#B0B0B0"/>
  <!-- Landscaping -->
  <rect x="150" y="195" width="100" height="6" fill="#558B2F" rx="3" opacity="0.6"/>
  <circle cx="165" cy="190" r="8" fill="#43A047" opacity="0.7"/>
  <circle cx="185" cy="188" r="10" fill="#66BB6A" opacity="0.7"/>
  <circle cx="215" cy="190" r="8" fill="#43A047" opacity="0.7"/>
  <circle cx="235" cy="188" r="10" fill="#66BB6A" opacity="0.7"/>
  <!-- Parking area -->
  <rect x="70" y="220" width="2" height="30" fill="#A0A8B0"/>
  <rect x="130" y="220" width="2" height="30" fill="#A0A8B0"/>
  <rect x="270" y="220" width="2" height="30" fill="#A0A8B0"/>
  <rect x="330" y="220" width="2" height="30" fill="#A0A8B0"/>
  <!-- Warm light glow from golden hour -->
  <rect x="0" y="0" width="400" height="267" fill="#F0A030" opacity="0.05"/>
</svg>