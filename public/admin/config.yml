backend:
  name: github
  repo: jimkittridge/TestGithub
  branch: claude/build-flexspace-site-dSsmL

media_folder: public/images
public_folder: /images

site_url: https://getflexspace.com

collections:
  # ─── Locations ───
  - name: locations
    label: Locations
    label_singular: Location
    folder: src/content/locations
    create: true
    format: frontmatter
    slug: "{{slug}}"
    summary: "{{name}}, {{state}}"
    fields:
      - { label: Name, name: name, widget: string, hint: "City name (e.g. Asheville)" }
      - { label: State, name: state, widget: string, hint: "State abbreviation (e.g. NC)" }
      - { label: Full Name, name: fullName, widget: string, hint: "City, State (e.g. Asheville, NC)" }
      - { label: Slug, name: slug, widget: string, hint: "URL slug (e.g. asheville-nc)" }
      - label: Availability
        name: availability
        widget: select
        options: [available, full]
      - { label: Available Units, name: availableUnits, widget: string, required: false, default: "" }
      - { label: City Image, name: image, widget: image, required: false, default: "" }
      - label: Gallery
        name: gallery
        widget: list
        field: { label: Image, name: image, widget: image }
        required: false
        hint: "Property photos shown in the gallery section on the location page"
      - { label: Tagline, name: tagline, widget: string, required: false, default: "", hint: "Short tagline shown on city cards" }
      - label: SEO
        name: seo
        widget: object
        fields:
          - { label: Title, name: title, widget: string }
          - { label: Description, name: description, widget: text }
      - label: Specs
        name: specs
        widget: object
        fields:
          - { label: Ceiling Height, name: ceilingHeight, widget: string }
          - { label: Power, name: power, widget: string }
          - { label: Door Size, name: doorSize, widget: string }
          - { label: HVAC, name: hvac, widget: string }
          - { label: Suite Range, name: suiteRange, widget: string }
          - { label: Lease Term, name: lease, widget: string, required: false, default: "1–3 years" }
      - { label: Map Embed URL, name: mapEmbedUrl, widget: string }
      - label: Local Guide
        name: localGuide
        widget: object
        fields:
          - { label: Heading, name: heading, widget: string }
          - { label: Nearby Highways, name: nearbyHighways, widget: list }
          - { label: Airport, name: airport, widget: string }
          - { label: Submarkets, name: submarkets, widget: list }
          - { label: Demand Drivers, name: demandDrivers, widget: list }
      - label: Suites
        name: suites
        widget: list
        fields:
          - { label: Name, name: name, widget: string, hint: "e.g. Available Suite, Standard Suite" }
          - { label: Size, name: size, widget: string, hint: "e.g. 2,500 SF" }
          - label: Status
            name: status
            widget: select
            options: [available, waitlist]
          - { label: Description, name: description, widget: text }
          - label: Base Rent
            name: baseRent
            widget: string
            required: false
            default: ""
            hint: "e.g. '$12.95 / SF NNN' — leave blank to show 'Contact for current rate'"
      - label: Tenant Profiles
        name: tenantProfiles
        widget: list
        fields:
          - { label: Title, name: title, widget: string }
          - { label: Description, name: description, widget: text }
      - label: FAQ
        name: faq
        widget: list
        fields:
          - { label: Question, name: question, widget: string }
          - { label: Answer, name: answer, widget: text }
      - label: Schema / Address
        name: schema
        widget: object
        fields:
          - label: Address
            name: address
            widget: object
            fields:
              - { label: Street, name: street, widget: string }
              - { label: City, name: city, widget: string }
              - { label: State, name: state, widget: string }
              - { label: Zip, name: zip, widget: string }
          - label: Geo
            name: geo
            widget: object
            fields:
              - { label: Latitude, name: lat, widget: number, value_type: float }
              - { label: Longitude, name: lng, widget: number, value_type: float }
          - { label: Phone, name: phone, widget: string }
      # ─── SEO Heading Overrides ───
      - { label: Hero H1, name: heroH1, widget: string, required: false, default: "", hint: "Custom H1 for this location page (leave blank for default)" }
      - { label: Hero Subtitle, name: heroSubtitle, widget: text, required: false, default: "", hint: "Custom subtitle below H1 (leave blank to use tagline)" }
      - { label: Suites Section Heading, name: suitesHeading, widget: string, required: false, default: "" }
      - { label: Suites Section Subheading, name: suitesSubheading, widget: string, required: false, default: "" }
      - { label: Tenant Profiles Label, name: tenantProfilesLabel, widget: string, required: false, default: "" }
      - { label: Tenant Profiles Heading, name: tenantProfilesHeading, widget: string, required: false, default: "" }
      - { label: Tenant Profiles Subheading, name: tenantProfilesSubheading, widget: text, required: false, default: "" }
      - { label: Specs Section Heading, name: specsHeading, widget: string, required: false, default: "" }
      - { label: Specs Section Subheading, name: specsSubheading, widget: string, required: false, default: "" }
      - { label: FAQ Heading, name: faqHeading, widget: string, required: false, default: "" }
      - { label: CTA Heading, name: ctaHeading, widget: string, required: false, default: "" }
      - { label: CTA Subheading, name: ctaSubheading, widget: text, required: false, default: "" }
      - label: Gallery Alt Texts
        name: galleryAltTexts
        widget: list
        required: false
        field: { label: Alt Text, name: alt, widget: string }
        hint: "SEO alt text for each gallery image (in order)"
      - { label: "Location Description (markdown)", name: body, widget: markdown, hint: "The 'Why this city' paragraphs shown on the location page" }

  # ─── Blog ───
  - name: blog
    label: Blog
    label_singular: Blog Post
    folder: src/content/blog
    create: true
    format: frontmatter
    slug: "{{slug}}"
    summary: "{{title}}"
    sortable_fields: [title, date]
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Slug, name: slug, widget: string, hint: "URL slug (e.g. why-durham-flex-space)" }
      - { label: Description, name: description, widget: text, hint: "Short summary for SEO and blog cards" }
      - { label: Date, name: date, widget: datetime, format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false }
      - label: Categories
        name: categories
        widget: list
        field: { label: Category, name: category, widget: string }
        hint: "e.g. NC, SC, Durham, Asheville, Columbia"
      - { label: Featured Image, name: image, widget: image, required: false, default: "" }
      - { label: Image Alt Text, name: imageAlt, widget: string, required: false, default: "" }
      - { label: Author, name: author, widget: string, required: false, default: "GetFlexSpace" }
      - { label: "Post Content", name: body, widget: markdown }

  # ─── Homepage ───
  - name: pages
    label: Pages
    files:
      - label: Homepage
        name: homepage
        file: src/content/pages/homepage.md
        fields:
          - label: SEO
            name: seo
            widget: object
            fields:
              - { label: Title, name: title, widget: string }
              - { label: Description, name: description, widget: text }
          - { label: Hero Background Image, name: heroBackgroundImage, widget: image, required: false, hint: "Background image for the homepage hero section" }
          - { label: Hero Overlay Color, name: heroOverlayColor, widget: color, required: false, default: "#000000", hint: "Color of the overlay on top of the hero background image" }
          - { label: Hero Overlay Opacity, name: heroOverlayOpacity, widget: number, required: false, default: 55, min: 0, max: 100, value_type: int, hint: "Opacity of the hero overlay (0 = transparent, 100 = solid)" }
          - { label: Logo, name: logo, widget: image, required: false, hint: "Site logo shown in header and footer" }
          - label: Hero
            name: hero
            widget: object
            fields:
              - { label: Headline, name: headline, widget: string }
              - { label: Subheadline, name: subheadline, widget: string }
          - label: Hero Bullets
            name: bullets
            widget: list
            field: { label: Bullet, name: bullet, widget: string }
          - label: City Section
            name: citySection
            widget: object
            fields:
              - { label: Heading, name: heading, widget: string }
              - { label: Subheading, name: subheading, widget: string }
          - label: Use Cases
            name: useCases
            widget: object
            fields:
              - { label: Heading, name: heading, widget: string }
              - { label: Subheading, name: subheading, widget: string }
              - label: Items
                name: items
                widget: list
                fields:
                  - { label: Title, name: title, widget: string }
                  - { label: Description, name: description, widget: text }
                  - label: Icon
                    name: icon
                    widget: select
                    options: [hammer, package, gear, beer, palette, briefcase]
          - label: Highlights
            name: highlights
            widget: object
            fields:
              - { label: Heading, name: heading, widget: string }
              - { label: Subheading, name: subheading, widget: string }
              - label: Items
                name: items
                widget: list
                fields:
                  - { label: Number/Value, name: number, widget: string }
                  - { label: Label, name: label, widget: string }
          - label: Process
            name: process
            widget: object
            fields:
              - { label: Heading, name: heading, widget: string }
              - { label: Subheading, name: subheading, widget: string }
              - label: Steps
                name: steps
                widget: list
                fields:
                  - { label: Title, name: title, widget: string }
                  - { label: Description, name: description, widget: text }
          - label: Lead Strip
            name: leadStrip
            widget: object
            fields:
              - { label: Heading, name: heading, widget: string }
              - { label: Subheading, name: subheading, widget: string }
          - label: FAQ
            name: faq
            widget: list
            fields:
              - { label: Question, name: question, widget: string }
              - { label: Answer, name: answer, widget: text }
          - label: Final CTA
            name: finalCta
            widget: object
            fields:
              - { label: Heading, name: heading, widget: string }
              - { label: Subheading, name: subheading, widget: string }

      # ─── About ───
      - label: About
        name: about
        file: src/content/pages/about.md
        fields:
          - label: SEO
            name: seo
            widget: object
            fields:
              - { label: Title, name: title, widget: string }
              - { label: Description, name: description, widget: text }
          - label: Hero
            name: hero
            widget: object
            fields:
              - { label: Headline, name: headline, widget: string }
              - { label: Subheadline, name: subheadline, widget: string }
          - { label: Hero Image, name: heroImage, widget: image, required: false }
          - label: Values
            name: values
            widget: list
            fields:
              - { label: Title, name: title, widget: string }
              - { label: Description, name: description, widget: text }
          - label: CTA
            name: cta
            widget: object
            fields:
              - { label: Heading, name: heading, widget: string }
              - { label: Subheading, name: subheading, widget: string }
          - { label: "Story Content (markdown)", name: body, widget: markdown }

      # ─── FAQ ───
      - label: FAQ Page
        name: faq
        file: src/content/pages/faq.md
        fields:
          - label: SEO
            name: seo
            widget: object
            fields:
              - { label: Title, name: title, widget: string }
              - { label: Description, name: description, widget: text }
          - label: Hero
            name: hero
            widget: object
            fields:
              - { label: Headline, name: headline, widget: string }
              - { label: Subheadline, name: subheadline, widget: string }
          - label: FAQ Items
            name: items
            widget: list
            fields:
              - { label: Question, name: question, widget: string }
              - { label: Answer, name: answer, widget: text }

      # ─── Contact ───
      - label: Contact
        name: contact
        file: src/content/pages/contact.md
        fields:
          - label: SEO
            name: seo
            widget: object
            fields:
              - { label: Title, name: title, widget: string }
              - { label: Description, name: description, widget: text }
          - label: Hero
            name: hero
            widget: object
            fields:
              - { label: Headline, name: headline, widget: string }
              - { label: Subheadline, name: subheadline, widget: string }
          - { label: Email, name: email, widget: string }
          - { label: Phone (display), name: phone, widget: string }
          - { label: Phone (href), name: phoneHref, widget: string }
          - { label: Office Hours, name: officeHours, widget: string }
          - { label: Tenant Access, name: tenantAccess, widget: string }
